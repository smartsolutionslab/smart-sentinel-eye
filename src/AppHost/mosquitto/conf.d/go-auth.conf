# mosquitto-go-auth plugin options (spec 008 ADR-0100).
#
# Chain order: `files` first so the spec 006 password-seeded users
# (station-4, camera-12, event-ingestion) keep working; `jwt`
# fallback validates Keycloak-minted service-account tokens for
# devices registered via the Identity API.

auth_opt_backends files,jwt
auth_opt_log_level info
auth_opt_log_dest stdout

# --- files backend (legacy passwords + ACL) ---
auth_opt_files_password_path /mosquitto/config/passwords.txt
auth_opt_files_acl_path /mosquitto/config/acl.txt

# --- jwt backend (Keycloak service-account JWTs) ---
auth_opt_jwt_mode local
auth_opt_jwt_parse_token true
auth_opt_jwt_userfield azp
auth_opt_jwt_jwks_uri http://keycloak:8080/realms/smart-sentinel-eye/protocol/openid-connect/certs
auth_opt_jwt_jwks_cache_ttl 86400
auth_opt_jwt_skip_user_expiration false
auth_opt_jwt_skip_acl_expiration false
