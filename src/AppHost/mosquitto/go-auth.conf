# mosquitto-go-auth — JWT mode (spec 008 ADR-0100).
#
# Devices authenticate with a Keycloak-minted client_credentials JWT
# carrying:
#   - azp:   "<deviceType>-<deviceIdentifier>"  (e.g. "plc-station-4")
#   - groups: ["/fabs/<fabId>"]
#   - scope:  "... sse.events.publish ..."
#
# The plugin validates the JWT signature against the realm's JWKS
# (cached 24 h, refetched on signature failure to handle kid
# rotation transparently — FR-006), then evaluates the ACL below
# against the JWT claims and the requested topic.

auth_plugin /mosquitto/go-auth.so

auth_opt_log_level info
auth_opt_log_dest stdout

auth_opt_backends jwt

# JWT validated against the realm's JWKS endpoint. The plugin
# refetches the keyset on a signature-validation failure so a
# Keycloak signing-key rotation invalidates outstanding tokens at
# the next refresh.
auth_opt_jwt_mode             remote
auth_opt_jwt_remote           true
auth_opt_jwt_host             keycloak
auth_opt_jwt_port             8080
auth_opt_jwt_with_tls         false
auth_opt_jwt_skip_user_expiration  false
auth_opt_jwt_skip_acl_expiration   false
auth_opt_jwt_userinfo_uri     /realms/smart-sentinel-eye/protocol/openid-connect/userinfo
auth_opt_jwt_jwks_uri         http://keycloak:8080/realms/smart-sentinel-eye/protocol/openid-connect/certs
auth_opt_jwt_jwks_cache_ttl   86400
auth_opt_jwt_userfield        azp

# Topic ACL — write side only (devices publish, never subscribe).
# A publish to fab/<fabId>/<source>/<deviceIdentifier> is allowed iff
#   - the token scope contains "sse.events.publish"
#   - the token's groups claim contains "/fabs/<fabId>"
#   - the token's azp claim equals "<source>-<deviceIdentifier>"
# The plugin's claim-templating syntax (%CLAIM%) interpolates the
# JWT claims into the topic pattern; the broker rejects any publish
# that doesn't match.
auth_opt_jwt_acl_pattern_write   fab/%groups[fabs]%/%source%/%deviceId%
auth_opt_jwt_acl_scopes_publish  sse.events.publish

# The EventIngestion subscriber connects with the legacy
# event-ingestion password (retained in passwords.txt for v1 per
# FR-016 hard-cut migration scope). The plugin falls through to
# the password backend only for that single account; everything
# else must present a JWT.
auth_opt_jwt_fallback_user    event-ingestion
