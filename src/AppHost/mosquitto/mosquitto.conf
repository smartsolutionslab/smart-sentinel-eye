# Mosquitto config for dev (Aspire AppHost bind-mount).
#
# Spec 006 + ADR-0095. Plaintext listener on 1883 for dev only;
# prod uses TLS on 8883 via the Helm chart.
#
# Auth (spec 008 ADR-0100): the custom go-auth plugin validates
# Keycloak-minted RS256 JWTs against the realm JWKS (the JWKS URI is
# injected by AppHost as SSE_JWT_JWKS_URI). A non-JWT password defers
# to the password_file below, so the spec 006 seeded users keep
# working.

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwords.txt
acl_file /mosquitto/config/acl.txt

plugin /mosquitto/sse-jwt-auth.so
plugin_opt_jwt_realm_path /realms/smart-sentinel-eye

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
log_timestamp_format %Y-%m-%dT%H:%M:%S
