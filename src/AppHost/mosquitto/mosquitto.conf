# Mosquitto config for dev (Aspire AppHost bind-mount).
#
# Spec 006 + ADR-0095. Plaintext listener on 1883 for dev only;
# prod uses TLS on 8883 via the Helm chart.
#
# Auth: per-device passwords + ACL file. No anonymous connections.
# Persistence on so a process restart resumes QoS 1 sessions.

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwords.txt
acl_file /mosquitto/config/acl.txt

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
log_timestamp_format %Y-%m-%dT%H:%M:%S
