# Mosquitto config for dev (Aspire AppHost bind-mount).
#
# Spec 006 + ADR-0095 + spec 008 ADR-0100. Plaintext listener on
# 1883 for dev only; prod uses TLS on 8883 via the Helm chart.
#
# Auth: the mosquitto-go-auth plugin chains a `files` backend
# (existing password-file + ACL, kept for the spec 006
# event-ingestion subscriber + the seeded station-4 / camera-12
# users) with a `jwt` backend that validates Keycloak-minted
# service-account JWTs against the realm's JWKS. Plugin options
# live in `conf.d/go-auth.conf` and load via `include_dir`.

listener 1883
protocol mqtt

auth_plugin /mosquitto/go-auth.so
include_dir /mosquitto/config/conf.d

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
log_timestamp_format %Y-%m-%dT%H:%M:%S
