# Mosquitto config for dev (Aspire AppHost bind-mount).
#
# Spec 006 + ADR-0095. Plaintext listener on 1883 for dev only;
# prod uses TLS on 8883 via the Helm chart.
#
# Auth path:
#   - **Dev (this file)**: per-device password file + ACL, kept
#     in `passwords.txt` and `acl.txt`. Simple to seed; no
#     Keycloak dependency.
#   - **Prod (spec 008 ADR-0100)**: mosquitto-go-auth plugin
#     validating Keycloak-minted JWTs against the realm's JWKS.
#     Switch to the image built from `Dockerfile` and uncomment
#     the `auth_plugin` line below to load `go-auth.conf`. The
#     Helm overlay for prod already does this.

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwords.txt
acl_file /mosquitto/config/acl.txt

# Uncomment when running against the mosquitto-go-auth image
# (built from this folder's `Dockerfile`). The plugin reads its
# options from `go-auth.conf` which the AppHost bind-mounts
# alongside this file.
# auth_plugin /mosquitto/go-auth.so
# include_dir /mosquitto/config/conf.d

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
log_timestamp_format %Y-%m-%dT%H:%M:%S
