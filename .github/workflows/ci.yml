name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so a force-push doesn't queue
# obsolete jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  backend:
    name: backend — build + unit tests + coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'nuget.config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SmartSentinelEye.slnx

      - name: Build (Release)
        run: dotnet build SmartSentinelEye.slnx -c Release --no-restore

      - name: Unit + architecture tests (skip integration)
        run: |
          dotnet test SmartSentinelEye.slnx \
            -c Release \
            --no-build \
            --filter 'FullyQualifiedName!~Integration' \
            --logger "trx;LogFileName=test.trx"

      - name: Coverage gate (ADR-0065)
        shell: pwsh
        run: pwsh scripts/coverage-check.ps1 -Configuration Release

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/report
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: '**/TestResults/*.trx'
          retention-days: 14

  frontend:
    name: frontend — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --filter "./apps/**" lint

      - name: Typecheck
        run: pnpm -r --filter "./apps/**" typecheck

      - name: Test
        run: pnpm -r --filter "./apps/**" test

  integration:
    name: integration tests (Docker)
    runs-on: ubuntu-latest
    needs: [backend]
    timeout-minutes: 30
    # Integration tests are gated on the cheaper backend job passing
    # first; no point burning the 30-minute container-startup budget on
    # a branch that already fails unit tests.
    #
    # NON-BLOCKING during stabilisation: the Linux/CI environment
    # surfaces real failures (overlay-designer endpoint timeouts, WHEP
    # 500s) that don't repro on the Windows dev boxes. The job still
    # runs, logs the failures, and uploads the .trx artifacts — but
    # doesn't fail the check. Remove ``continue-on-error`` once the
    # underlying flakes are stabilised — tracked by #423.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'nuget.config') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Verify Docker is available
        run: docker info

      - name: Restore
        run: dotnet restore tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj

      - name: Build integration tests (Release)
        run: dotnet build tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj -c Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=integration.trx"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          retention-days: 14
