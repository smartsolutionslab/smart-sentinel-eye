name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref so a force-push doesn't queue
# obsolete jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Actions are pinned to commit SHAs (supply-chain hardening); the trailing
# comment is the human-readable tag. The .NET SDK is pinned via global.json.
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  backend:
    name: backend — build + unit tests + coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET (version pinned via global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', 'global.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SmartSentinelEye.slnx

      - name: Build (Release)
        run: dotnet build SmartSentinelEye.slnx -c Release --no-restore

      # Single test pass: coverage-check runs the unit + architecture tests once
      # (with coverage + a .trx), reusing the build above via -NoBuild, and
      # enforces the ADR-0065 gate. Previously the suite ran twice — a plain
      # test step plus coverage-check rebuilding and re-running it.
      - name: Unit + architecture tests + coverage gate (ADR-0065)
        shell: pwsh
        run: pwsh scripts/coverage-check.ps1 -Configuration Release -NoBuild

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: artifacts/coverage/report
          retention-days: 14

  frontend:
    name: frontend — lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.3

      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --filter "./apps/**" lint

      - name: Typecheck
        run: pnpm -r --filter "./apps/**" typecheck

      - name: Test
        run: pnpm -r --filter "./apps/**" test

  integration:
    name: integration tests (Docker)
    runs-on: ubuntu-latest
    needs: [backend]
    timeout-minutes: 30
    # Integration tests are gated on the cheaper backend job passing
    # first; no point burning the 30-minute container-startup budget on
    # a branch that already fails unit tests.
    #
    # NON-BLOCKING during stabilisation (tracked by #423): the Linux/CI
    # environment surfaces failures that don't repro on Windows dev boxes.
    # The job runs, logs failures, and uploads the .trx — but doesn't fail
    # the check. Remove ``continue-on-error`` once the flakes are stabilised.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET (version pinned via global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', 'global.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Verify Docker is available
        run: docker info

      - name: Restore
        run: dotnet restore tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj

      - name: Build integration tests (Release)
        run: dotnet build tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj -c Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/Integration.Tests/SmartSentinelEye.Integration.Tests.csproj \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=integration.trx"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-test-results
          path: '**/TestResults/*.trx'
          retention-days: 14
